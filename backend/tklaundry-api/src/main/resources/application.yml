spring:
  application:
    name: tklaundry-api
  datasource:
    url: "jdbc:sqlserver://127.0.0.1:1433;databaseName=TKLaundry;encrypt=true;trustServerCertificate=true"
    username: sa
    password: "1234"

mybatis:
  mapper-locations: classpath:mapper/**/*.xml

logging:
  level:
    "[com.tklaundry.api]": INFO
  file:
    name: logs/tklaundry-api.log
  logback:
    rollingpolicy:
      file-name-pattern: logs/tklaundry-api.%d{yyyy-MM-dd}.%i.log
      max-history: 30
